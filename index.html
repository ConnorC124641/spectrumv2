<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum - Locked</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #050505;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            color: white;
        }
        .login-box {
            background-color: #111;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #00ffff; /* Bright Cyan Border */
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            width: 320px;
        }
        h1 { 
            margin-bottom: 30px; 
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffff;
        }
        /* VISIBILITY FIX: */
        input {
            width: 100%; 
            padding: 15px; 
            margin-bottom: 25px;
            border-radius: 8px; 
            border: 2px solid #333; 
            background: #222; 
            color: white; /* White text */
            box-sizing: border-box; 
            text-align: center; 
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            outline: none;
        }
        input::placeholder {
            color: #888;
        }
        input:focus { 
            border-color: #00ffff; 
            box-shadow: 0 0 15px rgba(0,255,255,0.2); 
        }
        button {
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 8px;
            background-color: #00ffff; 
            color: black; 
            font-weight: 900;
            cursor: pointer; 
            font-size: 18px; 
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }
        button:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 25px #00ffff;
        }
        .error { 
            color: #ff0055; 
            margin-top: 20px; 
            display: none; 
            text-shadow: 0 0 5px #ff0055; 
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>LOCKED</h1>
        
        <input type="password" id="pass" placeholder="ENTER PASSCODE">
        
        <button id="unlock">UNLOCK</button>
        
        <p id="msg" class="error">ACCESS DENIED</p>
    </div>

    <script type="module">
        import { sha256 } from "https://cdn.jsdelivr.net/npm/hash-wasm@4.12.0/dist/index.esm.min.js"; // SHA256 hashing
        
        // Check for Enter key
        document.getElementById("pass").addEventListener("keypress", function(e) {
            if (e.key === "Enter") login();
        });

        async function login() {
            var input = document.getElementById("pass").value;
            let hashed = await sha256(input);

            console.log(input);
            console.log(hashed);
            
            // PASSWORD IS HERE
            if (hashed === "c600edf6ce0739a94a591d68b4a42d84b76a117e0395a1bb88c36aa5ae9024d7") {
                console.log("Correct password");
                // Set cookie for iPad/Safari support
                var d = new Date();
                d.setTime(d.getTime() + (30*24*60*60*1000));
                var expires = "expires="+ d.toUTCString();
                document.cookie = "spectrum_access=true;" + expires + ";path=/";
                
                window.location.href = "house.html";
            } else {
                console.log("Incorrect password");
                document.getElementById("msg").style.display = "block";
                document.getElementById("pass").value = "";
                alert("Wrong");
            }
        }

        document.getElementById("unlock").onclick = login;
    </script>
</body>
</html>
