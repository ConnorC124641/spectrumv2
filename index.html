<script>
    // Check for Enter key
    document.getElementById("pass").addEventListener("keypress", function(e) {
        if (e.key === "Enter") login();
    });

    // AUTO-SKIP: Check cookie
    if (document.cookie.indexOf("spectrum_access=true") !== -1) {
        window.location.href = "home.html";
    }

    function login() {
        var input = document.getElementById("pass").value;
        
        if (input === "kleen") {
            // SET A COOKIE FOR 30 DAYS
            var d = new Date();
            d.setTime(d.getTime() + (30*24*60*60*1000));
            var expires = "expires="+ d.toUTCString();
            document.cookie = "spectrum_access=true;" + expires + ";path=/";
            
            window.location.href = "home.html";
        } else {
            document.getElementById("msg").style.display = "block";
            document.getElementById("pass").value = "";
        }
    }
</script>
