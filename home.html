<!DOCTYPE html>
<html lang="en">
<head>
    

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum - Home</title>
    <script>
    async function checkLockdown() {
        // Your GitHub Info
        const user = "ConnorC124641";
        const repo = "spectrum";
        
        // Add timestamp to ensure we get the latest file version
        const url = `https://raw.githubusercontent.com/${user}/${repo}/main/server.json?t=${Date.now()}`;

        try {
            const response = await fetch(url);
            if (!response.ok) return; // If file error, keep site normal

            const data = await response.json();

            // If locked is true, replace the whole page
            if (data.locked === true) {
                
                // 1. Force the body to have no margins and be black
                document.body.style.margin = "0";
                document.body.style.padding = "0";
                document.body.style.backgroundColor = "black";
                document.body.style.height = "100vh";
                document.body.style.overflow = "hidden"; // Stop scrolling

                // 2. Inject the Lock Screen HTML
                document.body.innerHTML = `
                    <div style="
                        display: flex; 
                        flex-direction: column; 
                        justify-content: center; 
                        align-items: center; 
                        height: 100vh; 
                        width: 100vw; 
                        background-color: #000; 
                        color: #ff0000; 
                        font-family: sans-serif; 
                        text-align: center;
                    ">
                        <h1 style="
                            font-size: 60px; 
                            margin: 0 0 20px 0; 
                            text-transform: uppercase; 
                            text-shadow: 0 0 20px red;
                            letter-spacing: 5px;
                        ">
                            🚫 ACCESS DENIED
                        </h1>
                        
                        <p style="
                            color: white; 
                            font-size: 24px; 
                            max-width: 80%; 
                            line-height: 1.5;
                        ">
                            ${data.shutdown_message || "This site is currently locked by the Owner (Connor)."}
                        </p>
                        
                        <div style="
                            margin-top: 40px; 
                            border: 1px solid #333; 
                            padding: 10px 20px; 
                            color: #555; 
                            font-size: 12px; 
                            border-radius: 5px;
                        ">
                            SPECTRUM SECURITY SYSTEM
                        </div>
                    </div>
                `;
            }
        } catch (error) {
            console.log("Allowed.");
        }
    }
    
    checkLockdown();
</script>

    <link rel="stylesheet" href="styles.css?v=6">
    <style>
        /* This centers everything specifically for the home screen */
        .hero-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 80vh; /* Keeps it centered vertically */
            text-align: center;
        }

        .start-btn {
            background-color: var(--secondary, #00ffff);
            color: #000;
            padding: 20px 60px;
            font-size: 2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: none;
            cursor: pointer;
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px var(--secondary);
            letter-spacing: 2px;
        }

        .welcome-text {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>SPECTRUM</h1>
        <a href="home.html" class="nav-btn pink" style="color: white; border-left: 3px solid var(--primary);">HOME</a>
        <a href="games.html" class="nav-btn blue">GAMES</a>
        <a href="settings.html" class="nav-btn pink">SETTINGS</a>
        <a href="chat.html" class="nav-btn pink">CHAT</a>
        <a href="os.html" class="nav-btn pink">OS</a>
    </div>

    <div class="main-content">
        <div class="hero-container">
            <h1 style="color: white; font-size: 3rem; margin-bottom: 10px;">SPECTRUM</h1>
            <p class="welcome-text">Your library is ready.</p>
            
            <a href="games.html" class="start-btn">START PLAYING</a>
        </div>
    </div>

    <script src="dots.js"></script>

    <script>
        // Apply saved settings
        if (localStorage.getItem('spectrumTitle')) { document.title = localStorage.getItem('spectrumTitle'); }
        if (localStorage.getItem('primaryColor')) { document.documentElement.style.setProperty('--primary', localStorage.getItem('primaryColor')); }
        if (localStorage.getItem('secondaryColor')) { document.documentElement.style.setProperty('--secondary', localStorage.getItem('secondaryColor')); }
    </script>
</body>
</html>
