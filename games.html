    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        /* SEARCH BAR */
        #searchBar {
            padding: 15px;
            width: 80%;
            max-width: 500px;
            border-radius: 25px;
            border: 2px solid #00ffff;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            text-align: center;
            margin-bottom: 30px;
            outline: none;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-btn {
            background-color: #1a1a1a;
            border: 1px solid #333;
            color: #00ffff;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            text-transform: capitalize;
            text-decoration: none;
        }

        a { text-decoration: none; }

        .game-btn:hover {
            background-color: #00ffff;
            color: black;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        /* Back Button */
        .back-btn {
            margin-top: 30px;
            padding: 10px 30px;
            background-color: #ff3333;
            border: none;
            color: white;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
