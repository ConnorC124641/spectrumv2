    <style>
        /* Essential Layout overrides to ensure Sidebar works if style.css is missing them */
        body { display: flex; overflow-x: hidden; margin: 0; background-color: #050505; color: white; font-family: 'Orbitron', sans-serif; }
        
        /* Sidebar Styling defaults */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #111;
            padding-top: 20px;
            border-right: 2px solid #333; /* Will be colored by JS */
            z-index: 100;
        }
        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }
        .sidebar a:hover { color: #f1f1f1; }

        /* Content Area */
        .main-content {
            margin-left: 250px; /* Same as sidebar width */
            padding: 20px;
            width: 100%;
        }

        /* Canvas for dots.js */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }
        
        /* Grid Layout for "Spaced Out Big Buttons" */
        .game-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); /* Bigger buttons */
            gap: 25px; /* Spaced out */
            padding: 20px;
        }

        .game-btn {
            width: 100%;
            padding: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #333; /* Will be colored by JS */
            color: white;
            cursor: pointer;
            border-radius: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .game-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

    <script src="dots.js"></script>

    <script>
        // --- SEARCH ---
        function searchGames() {
            var input = document.getElementById("searchBar");
            var filter = input.value.toUpperCase();
            var container = document.getElementById("gameList");
            var buttons = container.getElementsByTagName("a");

            for (var i = 0; i < buttons.length; i++) {
                var txtValue = buttons[i].textContent || buttons[i].innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    buttons[i].style.display = "";
                } else {
                    buttons[i].style.display = "none";
                }
            }
        }

        // --- THEME COLOR APPLICATION (Assuming user has a saved theme) ---
        // This makes sure your buttons and sidebar get the color even with external CSS
        window.onload = function() {
            var savedTheme = localStorage.getItem('siteTheme');
            if(savedTheme) {
                // Apply to search bar border
                var search = document.getElementById("searchBar");
                if(search) search.style.borderColor = savedTheme;

                // Apply to Sidebar border
                var sidebar = document.getElementById("mySidebar");
                if(sidebar) sidebar.style.borderRightColor = savedTheme;

                // Apply to all Game Buttons
                var btns = document.getElementsByClassName("game-btn");
                for(var i=0; i<btns.length; i++) {
                    btns[i].style.borderColor = savedTheme;
                    btns[i].style.color = savedTheme;
                    
                    // Add hover effect listener
                    btns[i].addEventListener('mouseover', function(e) {
                        this.style.backgroundColor = savedTheme;
                        this.style.color = "#000"; // Black text on hover
                    });
                    btns[i].addEventListener('mouseout', function(e) {
                        this.style.backgroundColor = "rgba(0,0,0,0.7)";
                        this.style.color = savedTheme;
                    });
                }
            }
        };
    </script>
