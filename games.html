    <script>
        function filterGames() {
            var input = document.getElementById('searchBar');
            var filter = input.value.toUpperCase();
            var grid = document.getElementById("gameList");
            var a = grid.getElementsByTagName('a');

            for (var i = 0; i < a.length; i++) {
                var btn = a[i].getElementsByTagName("button")[0];
                var txtValue = btn.textContent || btn.innerText;
                if (txtValue.toUpperCase().indexOf(filter) > -1) {
                    a[i].style.display = "";
                } else {
                    a[i].style.display = "none";
                }
            }
        }
    </script>

    <script>
        if (localStorage.getItem('spectrumTitle')) {
            document.title = localStorage.getItem('spectrumTitle');
        }
        if (localStorage.getItem('primaryColor')) {
            document.documentElement.style.setProperty('--primary', localStorage.getItem('primaryColor'));
        }
        if (localStorage.getItem('secondaryColor')) {
            document.documentElement.style.setProperty('--secondary', localStorage.getItem('secondaryColor'));
        }
    </script>
