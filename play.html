<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum Player</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .game-container {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            /* 90% Zoom out effect */
            transform: scale(0.9); 
            transform-origin: center;
        }
        iframe {
            width: 100vw; height: 100vh;
            border: 2px solid #bc13fe;
            border-radius: 10px;
            background: #111;
        }
        .back-btn {
            position: fixed; top: 15px; left: 15px;
            padding: 10px 20px; background: #bc13fe;
            color: white; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; z-index: 999;
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.5);
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='house.html'">← BACK TO MENU</button>
    
    <div class="game-container">
        <iframe id="game-frame" src="about:blank"></iframe>
    </div>

    <script>
        // Get the filename from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const gameName = urlParams.get('game');
        
        const frame = document.getElementById('game-frame');

        if (gameName && gameName !== "null") {
            // It found a real file name!
            frame.src = gameName;
        } else {
            // If it says null, it shows this message
            document.body.innerHTML = `
                <div style="color: white; text-align: center; font-family: sans-serif;">
                    <h1 style="color: #bc13fe;">⚠️ LOAD ERROR</h1>
                    <p>No game file was detected in the URL.</p>
                    <button onclick="window.location.href='index.html'" style="padding: 10px; cursor: pointer;">Return to Games</button>
                </div>
            `;
        }
    </script>
</body>
</html>
