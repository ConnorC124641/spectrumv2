<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum Player</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .game-container {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            /* This creates that "zoomed out" 90% look */
            transform: scale(0.9); 
            transform-origin: center;
        }
        iframe {
            width: 100%; height: 100%;
            border: 2px solid #bc13fe; /* Optional: glow border */
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }
        .back-btn {
            position: fixed; top: 10px; left: 10px;
            padding: 8px 15px; background: #bc13fe;
            color: white; border: none; border-radius: 5px;
            cursor: pointer; font-family: sans-serif; z-index: 100;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'">← BACK</button>
    <div class="game-container">
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        // Get the game filename from the URL (?game=clfile.html)
        const params = new URLSearchParams(window.location.search);
        const gameSource = params.get('game');
        
        if (gameSource) {
            document.getElementById('game-frame').src = gameSource;
        } else {
            document.body.innerHTML = "<h1>No Game Selected</h1>";
        }
    </script>
</body>
</html>
