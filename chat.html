        body { font-family: 'Orbitron', sans-serif; background-color: #050505; color: white; margin: 0; }
        .sidebar { /* Your existing sidebar styles from styles.css */ }
        .game-container { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; border: 1px solid #bc13fe; }
        .game-btn { background: #bc13fe; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    </style>

<body>

    <div class="sidebar">
        <h1 style="font-size: 1.5rem; letter-spacing: 2px;">SPECTRUM</h1>
        <a href="home.html" class="nav-btn pink">HOME</a>
        <a href="gam.html" class="nav-btn blue">GAMES</a>
        <a href="chat.html" class="nav-btn pink" style="color: white; border-left: 3px solid #ff00ff;">CHAT</a>
        <a href="settings.html" class="nav-btn blue">SETTINGS</a>
    </div>

    <div style="flex-grow: 1; padding: 20px; color: white; display: flex; justify-content: center; align-items: flex-start; margin-left: 200px;">
        <div class="game-container" style="width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 10px;">
            <h2 style="text-align: center; margin-top: 0;">P2P Chat</h2>
            
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border-bottom: 2px solid #bc13fe;">
                <p style="margin-top: 0;">My ID: <strong id="my-id" style="color: #bc13fe;">Generating...</strong></p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="friend-id" placeholder="Paste Friend's ID" style="flex-grow: 1; padding: 10px; border-radius: 5px; border: none;">
                    <button class="game-btn" onclick="connectToFriend()">Connect</button>
                </div>
            </div>

            <div id="chat-box" style="height: 300px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 5px; border: 1px solid #444;">
                <div style="color: #777; font-style: italic;">System: Ready to chat...</div>
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="text" id="msg-input" placeholder="Type a message..." style="flex-grow: 1; padding: 10px; border-radius: 5px; border: none;">
                <button class="game-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
    // --- P2P CHAT LOGIC ---
    const peer = new Peer();
    let conn;

    peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });
    peer.on('connection', (c) => { conn = c; setupConnection(); });

    function connectToFriend() {
        const friendId = document.getElementById('friend-id').value;
        if (friendId) { conn = peer.connect(friendId); setupConnection(); }
    }

    function setupConnection() {
        conn.on('open', () => {
            addToChat('System', 'Connected!');
            conn.on('data', (data) => addToChat('Friend', data));
        });
    }

    function sendMessage() {
        const msg = document.getElementById('msg-input').value;
        if (msg && conn) {
            conn.send(msg);
            addToChat('Me', msg);
            document.getElementById('msg-input').value = '';
        }
    }

    function addToChat(user, text) {
        const box = document.getElementById('chat-box');
        let color = '#ccc';
        if (user === 'Me') color = '#bc13fe';
        if (user === 'Friend') color = '#00d4ff';
        box.innerHTML += `<div style="margin-bottom: 5px;"><strong style="color: ${color}">${user}:</strong> ${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }
