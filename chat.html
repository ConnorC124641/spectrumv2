<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum - Global Chat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        if (document.cookie.indexOf("spectrum_access=true") === -1) {
            window.location.href = "index.html";
        }
    </script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <link rel="stylesheet" href="styles.css?v=8">
    <style>
        body { 
            font-family: 'Orbitron', sans-serif; 
            background-color: #050505;
            color: white;
            margin: 0;
        }

        .chat-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh; /* Keeps it centered vertically */
            padding: 20px;
        }

        .chat-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .chat-header h2 {
            color: #00ffff;
            text-shadow: 0 0 15px #00ffff;
            letter-spacing: 4px;
            margin: 0;
        }

        /* CONTAINER FOR THE CBOX */
        .cbox-wrapper {
            width: 100%;
            max-width: 900px; /* Limits width on big screens */
            background: #111;
            padding: 10px;
            border: 2px solid #ff00ff; /* Pink border to match theme */
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
            box-sizing: border-box;
        }

        /* Makes the iframe inside responsive */
        iframe {
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1 style="font-size: 1.5rem; letter-spacing: 2px;">SPECTRUM</h1>
        <a href="home.html" class="nav-btn pink">HOME</a>
        <a href="games.html" class="nav-btn blue">GAMES</a>
        <a href="chat.html" class="nav-btn pink" style="color: white; border-left: 3px solid #ff00ff;">CHAT</a>
        <a href="settings.html" class="nav-btn blue">SETTINGS</a>
    </div>
 <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <div style="flex-grow: 1; padding: 20px; color: white; display: flex; justify-content: center; align-items: flex-start;">
        
        <div class="game-container" style="width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 10px;">
            <h2 style="text-align: center; margin-top: 0;">P2P Chat</h2>
            
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border-bottom: 2px solid #bc13fe;">
                <p style="margin-top: 0;">My ID: <strong id="my-id" style="color: #bc13fe;">Generating...</strong></p>
                
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="friend-id" placeholder="Paste Friend's ID" style="flex-grow: 1; padding: 10px; border-radius: 5px; border: none;">
                    
                    <button class="game-btn" onclick="connectToFriend()">Connect</button>
                </div>
            </div>

            <div id="chat-box" style="height: 300px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 5px; border: 1px solid #444;">
                <div style="color: #777; font-style: italic;">System: Ready to chat...</div>
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="text" id="msg-input" placeholder="Type a message..." style="flex-grow: 1; padding: 10px; border-radius: 5px; border: none;">
                
                <button class="game-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn;

        // Display my ID
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // Listen for incoming connection
        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
        });

        // Connect to friend
        function connectToFriend() {
            const friendId = document.getElementById('friend-id').value;
            if (friendId) {
                conn = peer.connect(friendId);
                setupConnection();
            } else {
                alert("Please enter a Friend ID first.");
            }
        }

        // Setup chat logic
        function setupConnection() {
            conn.on('open', () => {
                addToChat('System', 'Connected!');
                
                // Receive messages
                conn.on('data', (data) => {
                    addToChat('Friend', data);
                });
            });
        }

        // Send message
        function sendMessage() {
            const msg = document.getElementById('msg-input').value;
            if (msg && conn) {
                conn.send(msg);
                addToChat('Me', msg);
                document.getElementById('msg-input').value = '';
            } else if (!conn) {
                alert("You need to connect to a friend first!");
            }
        }

        // Add to chat box
        function addToChat(user, text) {
            const box = document.getElementById('chat-box');
            let color = '#ccc';
            if (user === 'Me') color = '#bc13fe';
            if (user === 'Friend') color = '#00d4ff';
            
            box.innerHTML += `<div style="margin-bottom: 5px;"><strong style="color: ${color}">${user}:</strong> ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
