<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum - Global Chat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        if (document.cookie.indexOf("spectrum_access=true") === -1) {
            window.location.href = "index.html";
        }
    </script>

    <link rel="stylesheet" href="styles.css?v=8">
    <style>
        body { 
            font-family: 'Orbitron', sans-serif; 
            background-color: #050505;
            color: white;
            margin: 0;
        }

        .chat-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh; /* Keeps it centered vertically */
            padding: 20px;
        }

        .chat-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .chat-header h2 {
            color: #00ffff;
            text-shadow: 0 0 15px #00ffff;
            letter-spacing: 4px;
            margin: 0;
        }

        /* CONTAINER FOR THE CBOX */
        .cbox-wrapper {
            width: 100%;
            max-width: 900px; /* Limits width on big screens */
            background: #111;
            padding: 10px;
            border: 2px solid #ff00ff; /* Pink border to match theme */
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
            box-sizing: border-box;
        }

        /* Makes the iframe inside responsive */
        iframe {
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1 style="font-size: 1.5rem; letter-spacing: 2px;">SPECTRUM</h1>
        <a href="home.html" class="nav-btn pink">HOME</a>
        <a href="games.html" class="nav-btn blue">GAMES</a>
        <a href="chat.html" class="nav-btn pink" style="color: white; border-left: 3px solid #ff00ff;">CHAT</a>
        <a href="settings.html" class="nav-btn blue">SETTINGS</a>
    </div>

    <div class="main-content">
        <div class="chat-layout">
            <div class="chat-header">
                <h2>GLOBAL CHAT</h2>
                <p style="font-size: 0.8rem; color: #666;">COMMUNICATION CHANNEL ACTIVE</p>
            </div>

            <div class="cbox-wrapper">
                </div>
               <iframe src="https://www3.cbox.ws/box/?boxid=3551767&boxtag=A7WHfP" width="100%" height="450" allowtransparency="yes" allow="autoplay" frameborder="0" marginheight="0" marginwidth="0" scrolling="auto"></iframe>	
        </div>
    </div>

</body>
</html>
