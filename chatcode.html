<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum Chat & Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        /* Special Styling for Admin Buttons */
        .admin-btn {
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 12px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        .btn-lock { background: #800000; border: 1px solid #ff4444; }
        .btn-lock:hover { background: #aa0000; box-shadow: 0 0 10px #ff0000; }

        .btn-unlock { background: #006400; border: 1px solid #00ff00; }
        .btn-unlock:hover { background: #008000; box-shadow: 0 0 10px #00ff00; }

        .btn-set { background: #4b0082; border: 1px solid #bc13fe; }
        .btn-set:hover { background: #6a0dad; box-shadow: 0 0 10px #bc13fe; }

        /* Input Styling */
        .admin-input {
            background: #111;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 4px;
            outline: none;
        }
        .admin-input:focus { border-color: #bc13fe; }
    </style>
</head>
<body style="display: flex; height: 100vh; margin: 0; background-color: #121212; font-family: sans-serif; overflow: hidden;">

    <div class="sidebar">
        <h2 style="color: #bc13fe; text-align: center;">SPECTRUM</h2>
        <nav style="display: flex; flex-direction: column; gap: 10px;">
            <a href="index.html"><button class="game-btn">🏠 Home</button></a>
            <a href="games.html"><button class="game-btn">🎮 Games</button></a>
            <a href="chatcode.html"><button class="game-btn">💬 Chat</button></a>
            <a href="os.html"><button class="game-btn">💻 OS</button></a>
            <a href="settings.html"><button class="game-btn">⚙️ Settings</button></a>
        </nav>
    </div>

    <div style="flex-grow: 1; padding: 20px; color: white; display: flex; flex-direction: column; align-items: center; overflow-y: auto;">
        
        <div class="game-container" style="width: 100%; max-width: 600px; display: flex; flex-direction: column; margin-bottom: 30px;">
            <h2 style="text-align: center; margin-top: 0;">P2P Chat</h2>
            
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border-bottom: 2px solid #bc13fe; margin-bottom: 10px;">
                <p style="margin-top: 0;">My ID: <strong id="my-id" style="color: #bc13fe;">Generating...</strong></p>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="friend-id" placeholder="Paste Friend's ID" style="flex-grow: 1; padding: 10px; border-radius: 5px; border: none;">
                    <button class="game-btn" onclick="connectToFriend()">Connect</button>
                </div>
            </div>

            <div id="chat-box" style="height: 250px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 5px; border: 1px solid #444; margin-bottom: 10px;">
                <div style="color: #777; font-style: italic;">System: Ready to chat...</div>
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="text" id="msg-input" placeholder="Type a message..." style="flex-grow: 1; padding: 10px; border-radius: 5px; border: none;">
                <button class="game-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div class="game-container" style="width: 100%; max-width: 600px; border: 2px dashed #bc13fe; background: rgba(20, 0, 20, 0.85); border-radius: 10px;">
            <h3 style="color: #bc13fe; margin-top: 0; text-align: center; text-shadow: 0 0 10px #bc13fe;">⚠️ ADMIN PANEL ⚠️</h3>
            
            <p style="font-size: 12px; color: #aaa; margin-bottom: 5px;">GitHub Token:</p>
            <input type="password" id="gh-token" class="admin-input" placeholder="Paste Token Here" style="width: 100%; margin-bottom: 15px; box-sizing: border-box;">

            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="admin-btn btn-lock" style="flex: 1;" onclick="updateServer(true)">🔒 LOCK SITE</button>
                <button class="admin-btn btn-unlock" style="flex: 1;" onclick="updateServer(false)">🔓 UNLOCK SITE</button>
            </div>

            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="number" id="admin-time" class="admin-input" placeholder="Mins" style="width: 80px;">
                <button class="admin-btn btn-set" style="flex: 1;" onclick="updateTime()">Set Global Timer</button>
            </div>
            
            <p id="admin-status" style="text-align: center; color: yellow; margin-top: 10px; font-weight: bold; min-height: 20px;"></p>
        </div>

    </div>

    <script>
        // --- CHAT LOGIC ---
        const peer = new Peer();
        let conn;

        peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });
        peer.on('connection', (c) => { conn = c; setupConnection(); });

        function connectToFriend() {
            const friendId = document.getElementById('friend-id').value;
            if (friendId) { conn = peer.connect(friendId); setupConnection(); }
        }

        function setupConnection() {
            conn.on('open', () => {
                addToChat('System', 'Connected!');
                conn.on('data', (data) => addToChat('Friend', data));
            });
        }

        function sendMessage() {
            const msg = document.getElementById('msg-input').value;
            if (msg && conn) {
                conn.send(msg);
                addToChat('Me', msg);
                document.getElementById('msg-input').value = '';
            }
        }

        function addToChat(user, text) {
            const box = document.getElementById('chat-box');
            let color = '#ccc';
            if (user === 'Me') color = '#bc13fe';
            if (user === 'Friend') color = '#00d4ff';
            box.innerHTML += `<div style="margin-bottom: 5px;"><strong style="color: ${color}">${user}:</strong> ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // --- ADMIN LOGIC ---
        async function updateServer(lockStatus, timeVal = null) {
            const token = document.getElementById('gh-token').value;
            const statusLabel = document.getElementById('admin-status');

            if (!token) { 
                statusLabel.innerText = "❌ Please paste your GitHub Token!";
                statusLabel.style.color = "red";
                return; 
            }
            
            statusLabel.innerText = "Connecting to GitHub...";
            statusLabel.style.color = "yellow";

            // YOUR GITHUB INFO
            const user = "ConnorC124641";
            const repo = "spectrum";
            const url = `https://api.github.com/repos/${user}/${repo}/contents/server.json`;

            try {
                // 1. Get current file (need SHA)
                const getReq = await fetch(url, { headers: { "Authorization": `token ${token}` } });
                
                if (!getReq.ok) throw new Error("Token invalid or file not found");
                
                const fileData = await getReq.json();
                const currentContent = JSON.parse(atob(fileData.content));

                // 2. Prepare new content
                const newContent = {
                    locked: lockStatus !== null ? lockStatus : currentContent.locked,
                    password: currentContent.password,
                    play_limit_minutes: timeVal !== null ? parseInt(timeVal) : currentContent.play_limit_minutes,
                    shutdown_message: currentContent.shutdown_message
                };

                // 3. Send update
                const putReq = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Admin Panel Update",
                        content: btoa(JSON.stringify(newContent, null, 2)),
                        sha: fileData.sha
                    })
                });

                if (putReq.ok) {
                    statusLabel.innerText = "✅ Success! Wait 60s for update.";
                    statusLabel.style.color = "#00ff00";
                } else {
                    statusLabel.innerText = "❌ Error updating file.";
                    statusLabel.style.color = "red";
                }

            } catch (err) {
                console.error(err);
                statusLabel.innerText = "❌ Connection Failed.";
                statusLabel.style.color = "red";
            }
        }

        function updateTime() {
            const t = document.getElementById('admin-time').value;
            if(t) updateServer(null, t);
        }
    </script>
</body>
</html>
